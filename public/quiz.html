<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KET Practice · 在线练习</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Noto+Serif+SC:wght@400;600&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --cream: #faf8f5; --warm: #f3ede6; --rose: #c4a08a; --rose-light: #e8d5c8;
            --rose-bg: #fdf5f0; --text: #3d3530; --text-light: #8a7e76; --accent: #b07d62;
            --correct: #6b9a7d; --correct-bg: #e6f4ea;
            --wrong: #c47070; --wrong-bg: #fce8e6;
            --selected: #b07d62; --selected-bg: #fdf5f0;
        }
        body { font-family: 'Noto Serif SC', 'Georgia', serif; background: var(--cream); color: var(--text); }

        /* Top bar */
        .top-bar {
            position: sticky; top: 0; z-index: 100; background: var(--accent); color: white;
            padding: 12px 24px; display: flex; justify-content: space-between; align-items: center;
            box-shadow: 0 2px 8px rgba(180,140,110,0.15);
        }
        .top-bar a { color: white; text-decoration: none; font-size: 0.9rem; opacity: 0.9; }
        .top-bar a:hover { opacity: 1; }
        .top-bar .center { font-weight: 600; font-family: 'Playfair Display', 'Noto Serif SC', serif; }
        .top-bar .right { display: flex; gap: 20px; font-size: 0.85rem; }
        .timer { font-family: 'Playfair Display', monospace; }

        /* Progress bar */
        .progress-bar { height: 3px; background: var(--rose-light); }
        .progress-fill { height: 100%; background: var(--rose); transition: width 0.3s; }

        /* Main layout */
        .quiz-container { max-width: 800px; margin: 0 auto; padding: 24px; }

        /* Test selector */
        .test-selector { text-align: center; padding: 60px 20px; }
        .test-selector h2 { font-family: 'Playfair Display', 'Noto Serif SC', serif; font-size: 1.6rem; margin-bottom: 32px; color: var(--accent); }
        .selector-intro {
            max-width: 640px; margin: 0 auto 24px; color: var(--text-light);
            font-size: 0.9rem; line-height: 1.8;
        }
        .resume-banner {
            max-width: 640px; margin: 0 auto 24px; text-align: left;
            background: linear-gradient(135deg, #fef3e8 0%, #fde6d3 100%);
            border: 1px solid var(--rose); border-radius: 20px;
            padding: 22px 24px; display: none; gap: 14px;
            box-shadow: 0 12px 32px rgba(180,120,80,0.18);
            position: relative; overflow: hidden;
        }
        .resume-banner::before {
            content: '↻'; position: absolute; right: 22px; top: 16px;
            font-size: 2.2rem; color: var(--accent); opacity: 0.18;
        }
        .resume-banner.show { display: grid; }
        .resume-banner .resume-eyebrow {
            display: inline-block; align-self: start;
            background: var(--accent); color: white;
            font-size: 0.72rem; font-weight: 600; letter-spacing: 0.08em;
            padding: 4px 10px; border-radius: 10px;
        }
        .resume-banner strong { color: var(--accent); font-size: 1.08rem; }
        .resume-banner p { color: var(--text); font-size: 0.88rem; line-height: 1.6; margin: 0; }
        .resume-progress {
            height: 6px; background: rgba(255,255,255,0.7); border-radius: 999px;
            overflow: hidden; margin: 4px 0 2px;
        }
        .resume-progress-fill {
            height: 100%; background: var(--accent); border-radius: 999px;
            transition: width 0.3s ease;
        }
        .resume-actions { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 4px; }
        .resume-btn {
            padding: 12px 22px; border-radius: 18px; border: none; font: inherit;
            font-weight: 600; cursor: pointer; transition: all 0.2s;
        }
        .resume-btn.primary {
            background: var(--accent); color: white;
            box-shadow: 0 6px 16px rgba(154,107,82,0.3);
        }
        .resume-btn.primary:hover { transform: translateY(-1px); box-shadow: 0 8px 20px rgba(154,107,82,0.4); }
        .resume-btn.secondary { background: rgba(255,255,255,0.8); color: var(--text-light); border: 1px solid var(--warm); }
        .resume-btn.secondary:hover { color: var(--accent); }

        /* Quiz intro screen */
        .quiz-intro {
            max-width: 600px; margin: 30px auto; text-align: center;
            background: white; border: 1px solid var(--warm); border-radius: 24px;
            padding: 36px 32px;
            box-shadow: 0 12px 32px rgba(180,140,110,0.1);
        }
        .intro-eyebrow {
            font-size: 0.72rem; color: var(--text-light); letter-spacing: 0.18em;
            text-transform: uppercase; margin-bottom: 8px;
        }
        .intro-title {
            font-family: 'Playfair Display', 'Noto Serif SC', serif;
            font-size: 1.5rem; color: var(--accent); margin: 0 0 24px;
        }
        .intro-meta {
            display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px;
            margin-bottom: 28px;
        }
        .intro-stat {
            background: var(--warm-bg, #faf6f1); border-radius: 16px;
            padding: 16px 8px; display: grid; gap: 4px;
        }
        .intro-stat strong { font-size: 1.6rem; color: var(--accent); font-weight: 700; }
        .intro-stat span { font-size: 0.78rem; color: var(--text-light); }
        .intro-parts {
            text-align: left; margin-bottom: 24px;
            background: #faf6f1; border-radius: 16px; padding: 16px 18px;
        }
        .intro-parts-label {
            font-size: 0.74rem; text-transform: uppercase; letter-spacing: 0.12em;
            color: var(--text-light); margin-bottom: 10px;
        }
        .intro-part-row {
            display: flex; align-items: center; gap: 12px;
            padding: 8px 0; border-bottom: 1px solid rgba(180,140,110,0.12);
            font-size: 0.88rem;
        }
        .intro-part-row:last-child { border-bottom: none; }
        .intro-part-num {
            font-weight: 700; color: var(--accent); min-width: 56px;
        }
        .intro-part-name { flex: 1; color: var(--text); }
        .intro-part-count { color: var(--text-light); font-size: 0.82rem; }
        .intro-tips {
            text-align: left; font-size: 0.84rem; color: var(--text-light);
            line-height: 1.9; margin-bottom: 24px;
        }
        .intro-start-btn {
            width: 100%; padding: 16px;
            background: var(--accent); color: white; border: none; border-radius: 18px;
            font: inherit; font-size: 1.02rem; font-weight: 700;
            cursor: pointer; transition: all 0.2s;
            box-shadow: 0 8px 20px rgba(154,107,82,0.28);
        }
        .intro-start-btn:hover { transform: translateY(-1px); box-shadow: 0 12px 26px rgba(154,107,82,0.36); }
        .intro-back-btn {
            margin-top: 12px; background: none; border: none; color: var(--text-light);
            font: inherit; font-size: 0.86rem; cursor: pointer; padding: 8px;
        }
        .intro-back-btn:hover { color: var(--accent); }
        @media (max-width: 600px) {
            .quiz-intro { padding: 28px 20px; margin: 16px auto; border-radius: 20px; }
            .intro-title { font-size: 1.25rem; }
            .intro-stat strong { font-size: 1.4rem; }
        }
        .test-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 16px; max-width: 640px; margin: 0 auto; }
        .test-option {
            background: white; border: 1px solid var(--warm); border-radius: 16px;
            padding: 28px 20px; cursor: pointer; transition: all 0.2s; text-align: center;
            position: relative; overflow: hidden;
        }
        .test-option::before {
            content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px;
            background: var(--rose-light); transition: background 0.25s;
        }
        .test-option:hover { border-color: var(--rose); box-shadow: 0 8px 30px rgba(180,140,110,0.1); transform: translateY(-2px); }
        .test-option:hover::before { background: var(--accent); }
        .test-option .test-name { font-family: 'Playfair Display', 'Noto Serif SC', serif; font-size: 1.1rem; font-weight: 600; color: var(--accent); margin-bottom: 6px; }
        .test-option .test-info { font-size: 0.8rem; color: var(--text-light); }

        /* Part header */
        .part-header {
            background: var(--rose-bg); border-radius: 12px; padding: 20px 24px;
            margin-bottom: 24px; border-left: 4px solid var(--accent);
        }
        .part-header h3 { font-family: 'Playfair Display', 'Noto Serif SC', serif; font-size: 1.1rem; color: var(--accent); margin-bottom: 6px; }
        .part-header p { font-size: 0.85rem; color: var(--text-light); line-height: 1.6; }

        /* Question card */
        .question-card {
            background: white; border: 1px solid var(--warm); border-radius: 16px;
            padding: 24px; margin-bottom: 16px; transition: border-color 0.2s;
            position: relative;
        }
        .question-card::before {
            content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px;
            background: var(--rose-light); border-radius: 16px 16px 0 0;
        }
        .question-card.answered { border-color: var(--rose); }
        .question-card.correct { border-color: var(--correct); background: var(--correct-bg); }
        .question-card.wrong { border-color: var(--wrong); background: var(--wrong-bg); }

        .q-number { font-size: 0.75rem; color: var(--accent); font-weight: 600; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 10px; }

        /* Text content (notices, signs, passages) */
        .q-text {
            background: var(--warm); border-radius: 8px; padding: 16px 20px;
            margin-bottom: 16px; font-size: 0.95rem; line-height: 1.7; white-space: pre-line;
        }
        .q-text.sign { text-align: center; font-weight: 600; border: 2px dashed var(--rose-light); background: #fffef5; }
        .q-text.notice { border-left: 4px solid var(--accent); background: var(--rose-bg); }
        .q-text.email { font-style: italic; background: #fefefe; border: 1px solid var(--warm); }
        .q-text.passage { font-size: 0.9rem; line-height: 1.8; max-height: 300px; overflow-y: auto; }

        /* Matching texts */
        .matching-texts { display: grid; gap: 12px; margin-bottom: 20px; }
        .matching-text { background: var(--warm); border-radius: 8px; padding: 14px 18px; }
        .matching-text .label { font-weight: 700; color: var(--accent); margin-bottom: 4px; font-size: 0.9rem; }
        .matching-text .content { font-size: 0.85rem; line-height: 1.6; color: var(--text); }

        /* Options */
        .options { display: flex; flex-direction: column; gap: 8px; }
        .option {
            display: flex; align-items: center; gap: 12px; padding: 12px 16px;
            border: 1px solid var(--warm); border-radius: 10px; cursor: pointer;
            transition: all 0.15s; font-size: 0.9rem;
        }
        .option:hover { border-color: var(--rose); background: var(--rose-bg); }
        .option.selected { border-color: var(--selected); background: var(--selected-bg); font-weight: 500; }
        .option.correct-answer { border-color: var(--correct); background: var(--correct-bg); }
        .option.wrong-answer { border-color: var(--wrong); background: var(--wrong-bg); }
        .option-letter {
            width: 28px; height: 28px; border-radius: 50%; border: 2px solid var(--warm);
            display: flex; align-items: center; justify-content: center;
            font-weight: 600; font-size: 0.8rem; flex-shrink: 0; transition: all 0.15s;
        }
        .option.selected .option-letter { border-color: var(--accent); background: var(--accent); color: white; }
        .option.correct-answer .option-letter { border-color: var(--correct); background: var(--correct); color: white; }
        .option.wrong-answer .option-letter { border-color: var(--wrong); background: var(--wrong); color: white; }

        /* Fill blank */
        .fill-input {
            width: 120px; padding: 8px 12px; border: 2px solid var(--warm); border-radius: 8px;
            font-size: 1rem; font-family: inherit; outline: none; transition: border-color 0.2s;
            display: inline-block; margin: 0 4px;
        }
        .fill-input:focus { border-color: var(--accent); }
        .fill-input.correct { border-color: var(--correct); background: var(--correct-bg); }
        .fill-input.wrong { border-color: var(--wrong); background: var(--wrong-bg); }
        .correct-hint { font-size: 0.8rem; color: var(--correct); margin-top: 6px; font-weight: 500; }

        /* Cloze passage with blanks */
        .cloze-passage { font-size: 0.95rem; line-height: 2; margin-bottom: 20px; padding: 16px 20px; background: var(--warm); border-radius: 8px; }
        .cloze-blank { font-weight: 700; color: var(--accent); padding: 2px 8px; background: var(--rose-bg); border-radius: 4px; }

        /* Navigation */
        .nav-buttons { display: flex; justify-content: space-between; margin-top: 32px; padding-top: 24px; border-top: 1px solid var(--warm); }
        .nav-btn {
            padding: 12px 28px; border: none; border-radius: 20px; font-size: 0.9rem;
            font-family: inherit; cursor: pointer; transition: all 0.2s;
        }
        .nav-btn.prev { background: white; border: 1px solid var(--warm); color: var(--text); }
        .nav-btn.prev:hover { border-color: var(--rose); color: var(--accent); }
        .nav-btn.next { background: var(--accent); color: white; }
        .nav-btn.next:hover { background: #9a6b52; }
        .nav-btn.submit { background: var(--correct); color: white; }
        .nav-btn.submit:hover { background: #5a8a6c; }
        .nav-btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .quiz-status-card {
            background: white; border: 1px solid var(--warm); border-radius: 14px;
            padding: 16px 18px; margin-bottom: 18px; display: grid; gap: 10px;
        }
        .quiz-status-card strong { color: var(--accent); }
        .quiz-status-meta {
            display: flex; flex-wrap: wrap; gap: 12px; color: var(--text-light);
            font-size: 0.82rem;
        }
        .quiz-status-pill {
            display: inline-flex; align-items: center; gap: 6px;
            padding: 5px 10px; border-radius: 999px; font-size: 0.76rem;
            background: var(--rose-bg); color: var(--accent); width: fit-content;
        }

        /* Results page */
        .results { text-align: center; padding: 40px 20px; }
        .results h2 { font-family: 'Playfair Display', 'Noto Serif SC', serif; font-size: 1.8rem; margin-bottom: 12px; }
        .score-circle {
            width: 160px; height: 160px; border-radius: 50%; margin: 24px auto;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            font-size: 2.4rem; font-weight: 700;
        }
        .score-circle.excellent { background: var(--correct-bg); color: var(--correct); border: 4px solid var(--correct); }
        .score-circle.good { background: #fff3e0; color: #e65100; border: 4px solid #fb8c00; }
        .score-circle.needs-work { background: var(--wrong-bg); color: var(--wrong); border: 4px solid var(--wrong); }
        .score-circle .label { font-size: 0.7rem; font-weight: 400; color: var(--text-light); }
        .score-detail { display: flex; justify-content: center; gap: 32px; margin: 24px 0; font-size: 0.9rem; color: var(--text-light); }
        .score-detail .val { font-weight: 600; color: var(--text); font-size: 1.1rem; }
        .result-actions { display: flex; gap: 12px; justify-content: center; margin-top: 24px; }
        .result-btn {
            padding: 12px 28px; border-radius: 20px; font-size: 0.9rem; font-family: inherit;
            cursor: pointer; text-decoration: none; transition: all 0.2s;
        }
        .result-btn.primary { background: var(--accent); color: white; border: none; }
        .result-btn.primary:hover { background: #9a6b52; }
        .result-btn.secondary { background: white; color: var(--text); border: 1px solid var(--warm); }
        .result-btn.secondary:hover { border-color: var(--rose); color: var(--accent); }
        .result-note {
            margin: 20px auto 0; max-width: 520px; color: var(--text-light);
            font-size: 0.85rem; line-height: 1.8;
        }
        .save-card {
            max-width: 520px; margin: 24px auto 0; text-align: left;
            background: white; border: 1px solid var(--warm); border-radius: 16px;
            padding: 18px 20px; display: grid; gap: 12px;
        }
        .save-card strong { color: var(--accent); font-size: 1rem; }
        .save-card p { color: var(--text-light); font-size: 0.86rem; line-height: 1.7; }
        .save-card .save-actions { display: flex; gap: 10px; flex-wrap: wrap; }

        .hidden { display: none !important; }

        /* Auth modal */
        .auth-overlay {
            display: none; position: fixed; inset: 0; z-index: 999;
            background: rgba(61,53,48,0.45); align-items: center; justify-content: center; padding: 20px;
        }
        .auth-overlay.show { display: flex; }
        .auth-modal {
            background: white; border-radius: 16px; padding: 32px 28px; width: 100%; max-width: 380px;
            position: relative; box-shadow: 0 20px 60px rgba(0,0,0,0.15);
        }
        .auth-modal::before {
            content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px;
            background: var(--accent); border-radius: 16px 16px 0 0;
        }
        .auth-modal h3 { font-family: 'Playfair Display', 'Noto Serif SC', serif; font-size: 1.2rem; color: var(--accent); margin-bottom: 4px; }
        .auth-modal .hint { font-size: 0.82rem; color: var(--text-light); margin-bottom: 20px; }
        .auth-modal .close-btn {
            position: absolute; top: 12px; right: 16px; background: none; border: none;
            font-size: 1.2rem; color: var(--text-light); cursor: pointer;
        }
        .auth-tabs { display: flex; border-bottom: 1px solid var(--warm); margin-bottom: 18px; }
        .auth-tab {
            flex: 1; text-align: center; padding: 10px 0; font-size: 0.85rem;
            color: var(--text-light); cursor: pointer; border-bottom: 2px solid transparent;
        }
        .auth-tab.active { color: var(--accent); border-bottom-color: var(--accent); font-weight: 600; }
        .auth-modal .form-group { margin-bottom: 14px; }
        .auth-modal .form-label { display: block; font-size: 0.75rem; color: var(--text-light); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 4px; }
        .auth-modal .form-input {
            width: 100%; padding: 10px 12px; border: 1px solid var(--warm); border-radius: 8px;
            font-size: 0.9rem; font-family: inherit; color: var(--text); background: var(--cream); outline: none;
        }
        .auth-modal .form-input:focus { border-color: var(--accent); }
        .auth-modal .submit-btn {
            width: 100%; padding: 11px; border: none; border-radius: 18px;
            background: var(--accent); color: white; font-size: 0.9rem; font-family: inherit; cursor: pointer;
        }
        .auth-modal .submit-btn:hover { background: #9a6b52; }
        .auth-modal .msg { margin-top: 10px; padding: 8px 12px; border-radius: 6px; font-size: 0.82rem; display: none; }
        .auth-modal .msg.show { display: block; }
        .auth-modal .msg.error { background: #fce8e6; color: var(--error); }
        .auth-modal .msg.success { background: #e6f4ea; color: #6b9a7d; }

        @media (max-width: 600px) {
            .quiz-container { padding: 16px; }
            .question-card { padding: 18px; }
            .top-bar { padding: 10px 16px; }
        }
    </style>
</head>
<body>

<div class="top-bar">
    <a href="index.html">← 返回</a>
    <span class="center" id="topTitle">KET Practice</span>
    <div class="right">
        <span class="timer" id="timer">00:00</span>
        <span id="progress">已答 0 / 0</span>
    </div>
</div>
<div class="progress-bar"><div class="progress-fill" id="progressBar" style="width:0%"></div></div>

<div class="quiz-container">
    <!-- Test selector -->
    <div id="selectorView" class="test-selector">
        <h2>选择练习套卷</h2>
        <p class="selector-intro">支持游客直接完成整套练习，结果先本地展示；登录后再保存到历史记录。中途作答会自动保存，下次可以继续。</p>
        <div id="resumeBanner" class="resume-banner"></div>
        <div class="test-grid" id="testGrid">加载中...</div>
    </div>

    <!-- Quiz view -->
    <div id="quizView" class="hidden"></div>

    <!-- Results view -->
    <div id="resultsView" class="hidden results"></div>
</div>

<!-- Auth Modal -->
<div class="auth-overlay" id="authOverlay">
    <div class="auth-modal">
        <button class="close-btn" onclick="closeAuthModal()">&times;</button>
        <h3 id="authModalTitle">登录后保存记录</h3>
        <p class="hint" id="authModalHint">注册/登录后可同步成绩和历史记录，游客也能先做完再保存。</p>
        <div class="auth-tabs">
            <div class="auth-tab active" onclick="switchAuthTab('login')">登录</div>
            <div class="auth-tab" onclick="switchAuthTab('register')">注册</div>
        </div>
        <form id="modalLoginForm" onsubmit="handleModalLogin(event)">
            <div class="form-group">
                <label class="form-label">用户名</label>
                <input class="form-input" name="username" placeholder="请输入用户名" required>
            </div>
            <div class="form-group">
                <label class="form-label">密码</label>
                <input class="form-input" name="password" type="password" placeholder="请输入密码" required>
            </div>
            <button class="submit-btn" type="submit">登录并保存</button>
            <div class="msg" id="modalLoginMsg"></div>
        </form>
        <form id="modalRegisterForm" style="display:none" onsubmit="handleModalRegister(event)">
            <div class="form-group">
                <label class="form-label">用户名</label>
                <input class="form-input" name="username" placeholder="3-20 字符" required>
            </div>
            <div class="form-group">
                <label class="form-label">邮箱</label>
                <input class="form-input" name="email" type="email" placeholder="用于找回账号" required>
            </div>
            <div class="form-group">
                <label class="form-label">密码</label>
                <input class="form-input" name="password" type="password" placeholder="至少 6 位" required>
            </div>
            <div class="form-group">
                <label class="form-label">手机号</label>
                <input class="form-input" name="phone" placeholder="选填">
            </div>
            <button class="submit-btn" type="submit">注册并保存</button>
            <div class="msg" id="modalRegisterMsg"></div>
        </form>
    </div>
</div>

<script src="analytics.js"></script>
<script>
    // Auth modal helpers
    let pendingSaveResult = false;
    function trackEvent(name, meta, eventGroup) {
        window.KETAnalytics?.track(name, { meta, eventGroup });
    }

    function showAuthModal(reason = 'save_result') {
        document.getElementById('authOverlay').classList.add('show');
        setText('authModalTitle', '登录后保存记录');
        setText('authModalHint', '注册/登录后可同步成绩和历史记录，游客也能先做完再保存。');
        trackEvent('quiz_save_history_click', { reason, answered: getAnsweredCount(), hasResult: Boolean(lastResult) });
    }
    function closeAuthModal() {
        document.getElementById('authOverlay').classList.remove('show');
        pendingSaveResult = false;
        trackEvent('quiz_auth_modal_close');
    }
    function switchAuthTab(tab) {
        document.querySelectorAll('.auth-tab').forEach((t, i) => t.classList.toggle('active', tab === 'login' ? i === 0 : i === 1));
        document.getElementById('modalLoginForm').style.display = tab === 'login' ? 'block' : 'none';
        document.getElementById('modalRegisterForm').style.display = tab === 'register' ? 'block' : 'none';
        trackEvent('quiz_auth_tab_switch', { tab });
    }
    function showModalMsg(id, text, type) {
        const el = document.getElementById(id);
        el.textContent = text; el.className = `msg show ${type}`;
    }
    async function handleModalLogin(e) {
        e.preventDefault();
        const form = e.target;
        trackEvent('auth_login_attempt', { source: 'quiz_modal', usernameLength: form.username.value.length });
        try {
            const r = await fetch('/api/auth/login', {
                method: 'POST', headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username: form.username.value, password: form.password.value }),
            });
            const res = await r.json();
            if (r.ok) {
                localStorage.setItem('token', res.token);
                localStorage.setItem('user', JSON.stringify(res.user));
                trackEvent('auth_login_success', { source: 'quiz_modal', role: res.user?.role || 'user' });
                const shouldPersist = pendingSaveResult;
                closeAuthModal();
                if (shouldPersist) {
                    pendingSaveResult = false;
                    await persistPendingResult('save_history');
                } else {
                    renderCurrentPart();
                }
            } else {
                trackEvent('auth_login_failure', { source: 'quiz_modal', reason: res.error || 'unknown' }, 'error');
                showModalMsg('modalLoginMsg', res.error, 'error');
            }
        } catch {
            trackEvent('auth_login_failure', { source: 'quiz_modal', reason: 'network' }, 'error');
            showModalMsg('modalLoginMsg', '网络错误', 'error');
        }
    }
    async function handleModalRegister(e) {
        e.preventDefault();
        const form = e.target;
        trackEvent('auth_register_attempt', { source: 'quiz_modal' });
        try {
            const r = await fetch('/api/auth/register', {
                method: 'POST', headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    username: form.username.value,
                    email: form.email.value,
                    password: form.password.value,
                    phone: form.phone.value || undefined,
                }),
            });
            const res = await r.json();
            if (r.ok) {
                if (res.token) {
                    localStorage.setItem('token', res.token);
                    localStorage.setItem('user', JSON.stringify(res.user));
                    trackEvent('auth_register_success', { source: 'quiz_modal', directLogin: true });
                    const shouldPersist = pendingSaveResult;
                    closeAuthModal();
                    if (shouldPersist) {
                        pendingSaveResult = false;
                        await persistPendingResult('save_history');
                    } else {
                        renderCurrentPart();
                    }
                } else {
                    trackEvent('auth_register_success', { source: 'quiz_modal', directLogin: false });
                    showModalMsg('modalRegisterMsg', res.message || '注册成功，请等待审核后登录', 'success');
                }
            } else {
                trackEvent('auth_register_failure', { source: 'quiz_modal', reason: res.error || 'unknown' }, 'error');
                showModalMsg('modalRegisterMsg', res.error, 'error');
            }
        } catch {
            trackEvent('auth_register_failure', { source: 'quiz_modal', reason: 'network' }, 'error');
            showModalMsg('modalRegisterMsg', '网络错误', 'error');
        }
    }
</script>

<script>
    // State
    const QUIZ_DRAFT_KEY = 'ket_quiz_draft_v2';
    const QUIZ_DRAFT_TTL_MS = 1000 * 60 * 60 * 48;
    let testData = null;
    let allQuestions = [];
    let userAnswers = {};
    let currentPartIdx = 0;
    let startTime = null;
    let timerInterval = null;
    let submitted = false;
    let currentTestId = '';
    let lastResult = null;
    let pendingResultPayload = null;
    const progressCheckpoints = new Set();

    // Level detection
    const params = new URLSearchParams(location.search);
    const currentLevel = params.get('level') || 'ket';
    setText('topTitle', currentLevel === 'pet' ? 'PET Practice' : 'KET Practice');

    function getAnsweredCount() {
        return Object.keys(userAnswers).filter(key => String(userAnswers[key] || '').trim() !== '').length;
    }

    function getElapsedSeconds() {
        return startTime ? Math.floor((Date.now() - startTime) / 1000) : 0;
    }

    function getStoredDraft() {
        try {
            const draft = JSON.parse(localStorage.getItem(QUIZ_DRAFT_KEY) || 'null');
            if (!draft?.testId || !draft?.savedAt) return null;
            if (Date.now() - draft.savedAt > QUIZ_DRAFT_TTL_MS) {
                localStorage.removeItem(QUIZ_DRAFT_KEY);
                return null;
            }
            return draft.level === currentLevel ? draft : null;
        } catch {
            localStorage.removeItem(QUIZ_DRAFT_KEY);
            return null;
        }
    }

    function clearDraft() {
        localStorage.removeItem(QUIZ_DRAFT_KEY);
    }

    function persistDraft() {
        if (!testData || submitted || !currentTestId) return;
        const answered = getAnsweredCount();
        if (!answered) {
            clearDraft();
            return;
        }
        localStorage.setItem(QUIZ_DRAFT_KEY, JSON.stringify({
            level: currentLevel,
            testId: currentTestId,
            title: testData.title,
            answered,
            total: allQuestions.length,
            userAnswers,
            currentPartIdx,
            elapsedSeconds: getElapsedSeconds(),
            savedAt: Date.now(),
        }));
    }

    function renderResumeBanner() {
        const banner = document.getElementById('resumeBanner');
        const draft = getStoredDraft();
        if (!draft) {
            banner.classList.remove('show');
            banner.innerHTML = '';
            return;
        }

        banner.classList.add('show');
        const answered = draft.answered || 0;
        const total = draft.total || 0;
        const pct = total ? Math.min(100, Math.round((answered / total) * 100)) : 0;
        const savedAgo = formatRelativeTime(draft.savedAt);
        banner.innerHTML = `
            <span class="resume-eyebrow">上次未完成</span>
            <strong>${draft.title || draft.testId}</strong>
            <p>已答 <strong>${answered}/${total}</strong> 题 · 草稿保存于 ${savedAgo}</p>
            <div class="resume-progress"><div class="resume-progress-fill" style="width:${pct}%"></div></div>
            <div class="resume-actions">
                <button class="resume-btn primary" id="resumeQuizBtn">继续上次（剩 ${Math.max(0, total - answered)} 题）</button>
                <button class="resume-btn secondary" id="discardQuizBtn">重新开始</button>
            </div>
        `;
        document.getElementById('resumeQuizBtn').onclick = () => {
            trackEvent('quiz_resume_start', { testId: draft.testId, answered: draft.answered || 0, total: draft.total || 0 });
            loadTest(draft.testId, draft.level, true);
        };
        document.getElementById('discardQuizBtn').onclick = () => {
            trackEvent('quiz_draft_discard', { testId: draft.testId });
            clearDraft();
            banner.classList.remove('show');
            banner.innerHTML = '';
            // Restart this test from scratch
            loadTest(draft.testId, draft.level, false);
        };
    }

    // Load test list
    async function loadTestList() {
        const testId = params.get('test');
        if (testId) { loadTest(testId); return; }

        try {
            const r = await fetch(`/data/${currentLevel}/index.json`);
            const data = await r.json();
            const level = data.levels.find(l => l.id === currentLevel);
            if (!level) return;
            const badgeLabel = { official: '官方', past_paper: '真题', practice: '练习' };
            document.getElementById('testGrid').innerHTML = level.tests.map(t =>
                `<div class="test-option" onclick="loadTest('${t.id}', '${currentLevel}')">
                    <div class="test-name">${t.title}</div>
                    <div class="test-info">${t.totalQuestions} 题 · Reading & Writing</div>
                    ${t.category ? `<div style="margin-top:6px;"><span style="display:inline-block;font-size:0.7rem;padding:2px 8px;border-radius:8px;${t.category === 'official' ? 'background:#fef3c7;color:#92400e' : t.category === 'past_paper' ? 'background:#dbeafe;color:#1e40af' : 'background:#f3f4f6;color:#6b7280'}">${badgeLabel[t.category] || t.category}</span></div>` : ''}
                    ${t.source ? `<div style="font-size:0.7rem;color:#9ca3af;margin-top:4px;">${t.source}</div>` : ''}
                </div>`
            ).join('');
            trackEvent('quiz_selector_view', { level: currentLevel, tests: level.tests.length });
            renderResumeBanner();
        } catch (e) { setText('testGrid', '加载失败'); }
    }

    // Load a specific test
    async function loadTest(testId, level, resumeFromDraft = false) {
        level = level || currentLevel;
        currentTestId = testId;
        trackEvent('quiz_test_select', { testId, level });
        try {
            const r = await fetch(`/data/${level}/${testId}.json`);
            testData = await r.json();
            setText('topTitle', testData.title);

            // Flatten all questions
            allQuestions = [];
            testData.parts.forEach(part => {
                part.questions.forEach(q => {
                    q._part = part;
                    allQuestions.push(q);
                });
            });

            const draft = resumeFromDraft ? getStoredDraft() : null;
            startQuiz(draft && draft.testId === testId ? draft : null);
        } catch (e) {
            trackEvent('quiz_load_failed', { testId, level, message: e.message || 'load_failed' }, 'error');
            alert('加载试卷失败: ' + e.message);
        }
    }

    function startQuiz(draft = null) {
        document.getElementById('selectorView').classList.add('hidden');
        document.getElementById('quizView').classList.remove('hidden');
        document.getElementById('resultsView').classList.add('hidden');
        userAnswers = draft?.userAnswers || {};
        currentPartIdx = draft?.currentPartIdx || 0;
        submitted = false;
        progressCheckpoints.clear();
        startTime = 0;
        if (timerInterval) { clearInterval(timerInterval); timerInterval = null; }

        if (draft) {
            // Resuming an existing draft → skip intro, jump straight in
            beginQuizSession(draft.elapsedSeconds || 0, true);
        } else {
            renderQuizIntro();
        }
    }

    function beginQuizSession(elapsedSeconds = 0, resumed = false) {
        startTime = Date.now() - (elapsedSeconds * 1000);
        if (timerInterval) clearInterval(timerInterval);
        updateTimer();
        timerInterval = setInterval(updateTimer, 1000);
        trackEvent('quiz_start', {
            level: currentLevel,
            title: testData?.title || '',
            totalQuestions: allQuestions.length,
            totalParts: testData?.parts?.length || 0,
            resumed,
        });
        renderCurrentPart();
        updateProgress();
        persistDraft();
    }

    function estimateMinutes() {
        // Practice pace ≈ 1.5 min per question, rounded to nearest 5
        const raw = Math.max(5, Math.round((allQuestions.length * 1.5) / 5) * 5);
        return raw;
    }

    function renderQuizIntro() {
        const view = document.getElementById('quizView');
        const loggedIn = Boolean(localStorage.getItem('token'));
        const partRows = (testData.parts || []).map((p, i) => `
            <div class="intro-part-row">
                <span class="intro-part-num">Part ${i + 1}</span>
                <span class="intro-part-name">${p.name || ''}</span>
                <span class="intro-part-count">${(p.questions || []).length} 题</span>
            </div>
        `).join('');

        view.innerHTML = `
            <div class="quiz-intro">
                <div class="intro-eyebrow">${currentLevel === 'pet' ? 'PET · B1 Preliminary' : 'KET · A2 Key'}</div>
                <h2 class="intro-title">${testData.title}</h2>
                <div class="intro-meta">
                    <div class="intro-stat">
                        <strong>${testData.parts?.length || 0}</strong>
                        <span>个 Part</span>
                    </div>
                    <div class="intro-stat">
                        <strong>${allQuestions.length}</strong>
                        <span>道题</span>
                    </div>
                    <div class="intro-stat">
                        <strong>~${estimateMinutes()}</strong>
                        <span>分钟</span>
                    </div>
                </div>
                <div class="intro-parts">
                    <div class="intro-parts-label">本套构成</div>
                    ${partRows}
                </div>
                <div class="intro-tips">
                    <div>✓ 中途随时离开，进度会自动保存，下次继续</div>
                    <div>✓ ${loggedIn ? '已登录，交卷后自动同步到历史' : '游客可直接做完，看到分数后再决定是否登录保存'}</div>
                    <div>✓ 不计时强制结束，按自己节奏来</div>
                </div>
                <button class="intro-start-btn" id="introStartBtn">开始作答 · Part 1 →</button>
                <button class="intro-back-btn" id="introBackBtn">先回去看看别的</button>
            </div>
        `;

        document.getElementById('introStartBtn').onclick = () => {
            trackEvent('quiz_intro_start', {
                testId: currentTestId,
                level: currentLevel,
                totalQuestions: allQuestions.length,
                totalParts: testData?.parts?.length || 0,
            });
            beginQuizSession(0, false);
        };
        document.getElementById('introBackBtn').onclick = () => {
            trackEvent('quiz_intro_back', { testId: currentTestId });
            document.getElementById('quizView').classList.add('hidden');
            document.getElementById('selectorView').classList.remove('hidden');
            view.innerHTML = '';
            currentTestId = null;
        };

        trackEvent('quiz_intro_view', {
            testId: currentTestId,
            level: currentLevel,
            totalQuestions: allQuestions.length,
            totalParts: testData?.parts?.length || 0,
        });
    }

    function setText(id, value) {
        const el = document.getElementById(id);
        if (el) el.textContent = value;
    }

    function formatRelativeTime(ts) {
        if (!ts) return '刚刚';
        const diff = Date.now() - ts;
        if (diff < 60_000) return '刚刚';
        if (diff < 3_600_000) return `${Math.round(diff / 60_000)} 分钟前`;
        if (diff < 86_400_000) return `${Math.round(diff / 3_600_000)} 小时前`;
        if (diff < 604_800_000) return `${Math.round(diff / 86_400_000)} 天前`;
        return new Date(ts).toLocaleDateString('zh-CN');
    }

    function updateTimer() {
        const el = document.getElementById('timer');
        if (!el) {
            // Element gone — interval is leaking, clean up to avoid log spam
            if (timerInterval) {
                clearInterval(timerInterval);
                timerInterval = null;
            }
            return;
        }
        const elapsed = Math.floor((Date.now() - startTime) / 1000);
        const m = String(Math.floor(elapsed / 60)).padStart(2, '0');
        const s = String(elapsed % 60).padStart(2, '0');
        el.textContent = `${m}:${s}`;
    }

    function renderCurrentPart() {
        const part = testData.parts[currentPartIdx];
        const view = document.getElementById('quizView');
        const draft = getStoredDraft();
        const answered = getAnsweredCount();
        const loggedIn = Boolean(localStorage.getItem('token'));

        let html = `
            <div class="quiz-status-card">
                <span class="quiz-status-pill">${loggedIn ? '已登录，交卷后自动保存' : '游客模式，可先完成再决定是否保存'}</span>
                <strong>${testData.title}</strong>
                <div class="quiz-status-meta">
                    <span>当前部分：${currentPartIdx + 1}/${testData.parts.length}</span>
                    <span>当前进度：${answered}/${allQuestions.length}</span>
                    <span>${draft ? `草稿已自动保存 ${new Date(draft.savedAt).toLocaleTimeString('zh-CN', { hour12: false })}` : '开始作答后将自动保存草稿'}</span>
                </div>
            </div>
            <div class="part-header"><h3>${part.name}</h3><p>${part.description}</p></div>
        `;

        // Part 2 matching: show texts first
        if (part.type === 'matching' && part.texts) {
            html += '<div class="matching-texts">';
            for (const [key, val] of Object.entries(part.texts)) {
                html += `<div class="matching-text"><div class="label">${key}. ${val.title}</div><div class="content">${val.content}</div></div>`;
            }
            html += '</div>';
        }

        // Part 3 passage
        if (part.type === 'multiple_choice' && part.passage) {
            html += `<div class="q-text passage">${part.passage}</div>`;
        }

        // Part 4 cloze passage
        if (part.type === 'cloze_choice' && part.passage) {
            html += `<div class="cloze-passage">${formatClozePassage(part.passage)}</div>`;
        }

        // Part 5 fill blank passage
        if (part.type === 'fill_blank' && part.passage) {
            html += `<div class="cloze-passage">${part.passage}</div>`;
        }

        // Gapped text: show passage and sentence options
        if (part.type === 'gapped_text') {
            if (part.passage) html += `<div class="q-text passage">${part.passage}</div>`;
            if (part.sentenceOptions) {
                html += '<div class="matching-texts"><div class="matching-text"><div class="label">Sentences</div><div class="content">';
                part.sentenceOptions.forEach(s => { html += `<div style="margin-bottom:4px;"><strong>${s.letter}.</strong> ${s.text}</div>`; });
                html += '</div></div></div>';
            }
        }

        // Render questions
        part.questions.forEach(q => {
            html += renderQuestion(q, part);
        });

        // Navigation
        const isFirst = currentPartIdx === 0;
        const isLast = currentPartIdx === testData.parts.length - 1;
        html += `<div class="nav-buttons">
            <button class="nav-btn prev" onclick="prevPart()" ${isFirst ? 'disabled' : ''}>← 上一部分</button>
            ${isLast
                ? '<button class="nav-btn submit" onclick="submitQuiz()">提交试卷 ✓</button>'
                : '<button class="nav-btn next" onclick="nextPart()">下一部分 →</button>'}
        </div>`;

        view.innerHTML = html;
        window.scrollTo(0, 0);
    }

    function renderQuestion(q, part) {
        const answered = userAnswers[q.number] !== undefined;
        let html = `<div class="question-card ${answered ? 'answered' : ''}" id="q${q.number}">`;
        html += `<div class="q-number">Question ${q.number}</div>`;

        // Question text (for Part 1 signs/notices)
        if (q.text && part.type !== 'cloze_choice' && part.type !== 'matching') {
            const textClass = q.textType || '';
            html += `<div class="q-text ${textClass}">${q.text}</div>`;
        }

        // For matching questions, show the question text + A/B/C options from texts
        if (part.type === 'matching' && q.text) {
            html += `<div style="margin-bottom:12px;font-size:0.95rem;">${q.text}</div>`;
            // Auto-generate options from part.texts keys
            if (!q.options && part.texts) {
                const keys = Object.keys(part.texts);
                html += '<div class="options">';
                keys.forEach(letter => {
                    const selected = userAnswers[q.number] === letter;
                    html += `<div class="option ${selected ? 'selected' : ''}" onclick="selectAnswer(${q.number}, '${letter}', this)">
                        <span class="option-letter">${letter}</span>
                        <span>${part.texts[letter].title}</span>
                    </div>`;
                });
                html += '</div>';
            }
        }

        // Options (for multiple_choice, matching, cloze_choice)
        if (q.options) {
            html += '<div class="options">';
            q.options.forEach((opt, i) => {
                const letter = String.fromCharCode(65 + i);
                const selected = userAnswers[q.number] === letter;
                html += `<div class="option ${selected ? 'selected' : ''}" onclick="selectAnswer(${q.number}, '${letter}', this)">
                    <span class="option-letter">${letter}</span>
                    <span>${opt.replace(/^[A-C]\.\s*/, '')}</span>
                </div>`;
            });
            html += '</div>';
        }

        // Gapped text: show sentence options as clickable
        if (part.type === 'gapped_text' && part.sentenceOptions) {
            html += `<div style="margin-bottom:12px;font-size:0.9rem;">选择要插入 ${q.text} 位置的句子：</div>`;
            html += '<div class="options">';
            part.sentenceOptions.forEach(s => {
                const selected = userAnswers[q.number] === s.letter;
                html += `<div class="option ${selected ? 'selected' : ''}" onclick="selectAnswer(${q.number}, '${s.letter}', this)">
                    <span class="option-letter">${s.letter}</span>
                    <span>${s.text}</span>
                </div>`;
            });
            html += '</div>';
        }

        // Fill blank input (Part 5)
        if (part.type === 'fill_blank' && !q.options) {
            const val = userAnswers[q.number] || '';
            html += `<div style="margin-top:8px;">
                <span style="font-size:0.85rem;color:var(--text-light);">第 ${q.number} 空：</span>
                <input class="fill-input" type="text" value="${val}" placeholder="填写答案"
                    oninput="fillAnswer(${q.number}, this.value)" autocomplete="off" spellcheck="false">
            </div>`;
        }

        html += '</div>';
        return html;
    }

    function formatClozePassage(text) {
        return text.replace(/\((\d+)\)____/g, '<span class="cloze-blank">($1) ____</span>');
    }

    function selectAnswer(qNum, letter, el) {
        if (submitted) return;
        userAnswers[qNum] = letter;
        // Update UI
        const card = el.closest('.question-card');
        card.querySelectorAll('.option').forEach(o => o.classList.remove('selected'));
        el.classList.add('selected');
        card.classList.add('answered');
        updateProgress();
        persistDraft();
    }

    function fillAnswer(qNum, value) {
        if (submitted) return;
        userAnswers[qNum] = value.trim();
        updateProgress();
        persistDraft();
    }

    function updateProgress() {
        const answered = getAnsweredCount();
        setText('progress', `已答 ${answered} / ${allQuestions.length}`);
        document.getElementById('progressBar').style.width = `${(answered / allQuestions.length) * 100}%`;
        maybeTrackProgressCheckpoint(answered);
    }

    function prevPart() {
        if (currentPartIdx > 0) {
            currentPartIdx--;
            trackEvent('quiz_part_nav', { direction: 'prev', partIndex: currentPartIdx + 1 });
            persistDraft();
            renderCurrentPart();
        }
    }

    function nextPart() {
        if (currentPartIdx < testData.parts.length - 1) {
            currentPartIdx++;
            trackEvent('quiz_part_nav', { direction: 'next', partIndex: currentPartIdx + 1 });
            persistDraft();
            renderCurrentPart();
        }
    }

    async function submitQuiz() {
        const answered = getAnsweredCount();
        trackEvent('quiz_submit_attempt', { answered, total: allQuestions.length });
        if (answered < allQuestions.length) {
            if (!confirm(`还有 ${allQuestions.length - answered} 题未作答，确定提交吗？`)) return;
        }
        doSubmit();
    }

    async function doSubmit() {
        submitted = true;
        clearInterval(timerInterval);
        const duration = getElapsedSeconds();

        // Calculate score
        let correct = 0;
        const answers = allQuestions.map(q => {
            const userAns = userAnswers[q.number] || '';
            let isRight = false;

            if (Array.isArray(q.answer)) {
                isRight = q.answer.some(a => a.toLowerCase() === userAns.toLowerCase());
            } else {
                isRight = userAns.toUpperCase() === q.answer.toUpperCase();
            }

            if (isRight) correct++;
            return { question: q.number, answer: userAns, correct: Array.isArray(q.answer) ? q.answer[0] : q.answer, isRight, points: q.points || 1 };
        });

        const total = allQuestions.length;
        const score = correct;
        const pct = Math.round((correct / total) * 100);
        pendingResultPayload = {
            level: currentLevel.toUpperCase(),
            year: 2024,
            answers,
            duration,
            score,
            correct,
            total,
            pct,
        };
        clearDraft();

        if (localStorage.getItem('token')) {
            await persistPendingResult('submit');
        } else {
            trackEvent('quiz_guest_result_shown', { correct, total, pct, duration, testId: currentTestId });
        }

        showResults(correct, total, pct, duration, answers);
    }

    function showResults(correct, total, pct, duration, answers) {
        lastResult = { correct, total, pct, duration, answers };
        renderResults();
    }

    function renderResults() {
        if (!lastResult) return;
        const { correct, total, pct, duration } = lastResult;
        const m = String(Math.floor(duration / 60)).padStart(2, '0');
        const s = String(duration % 60).padStart(2, '0');
        const grade = pct >= 80 ? 'excellent' : pct >= 60 ? 'good' : 'needs-work';
        const gradeText = pct >= 80 ? 'Excellent! 🎉' : pct >= 60 ? 'Good job! 👍' : 'Keep practicing! 💪';
        const hasToken = Boolean(localStorage.getItem('token'));
        const hasPendingSave = Boolean(pendingResultPayload);
        let saveCard = '';
        let resultNote = '';

        if (!hasToken && hasPendingSave) {
            saveCard = `
                <div class="save-card">
                    <strong>这次结果已生成，但还没保存到历史记录</strong>
                    <p>你现在是游客模式，成绩已经展示给你了。登录或注册后，可以把这次结果补存到个人历史和错题本。</p>
                    <div class="save-actions">
                        <button class="result-btn primary" id="saveHistoryBtn">登录后保存这次成绩</button>
                        <a class="result-btn secondary" href="login.html">前往登录页</a>
                    </div>
                </div>
            `;
        } else if (!hasPendingSave) {
            resultNote = '<p class="result-note">本次成绩已保存到历史记录，可在个人中心继续查看和回顾。</p>';
        } else if (hasToken && hasPendingSave) {
            saveCard = `
                <div class="save-card">
                    <strong>成绩暂未写入云端</strong>
                    <p>网络或接口异常时结果仍保留在当前页面。你可以重试保存，不会影响本地查看答案。</p>
                    <div class="save-actions">
                        <button class="result-btn primary" id="saveHistoryBtn">重试保存成绩</button>
                    </div>
                </div>
            `;
        }

        document.getElementById('quizView').classList.add('hidden');
        const view = document.getElementById('resultsView');
        view.classList.remove('hidden');

        view.innerHTML = `
            <h2>${gradeText}</h2>
            <div class="score-circle ${grade}">
                ${pct}%
                <div class="label">${correct}/${total}</div>
            </div>
            <div class="score-detail">
                <div><div class="val">${correct}</div>答对</div>
                <div><div class="val">${total - correct}</div>答错</div>
                <div><div class="val">${m}:${s}</div>用时</div>
            </div>
            <div class="result-actions">
                <button class="result-btn primary" onclick="reviewAnswers()">查看答案</button>
                <a class="result-btn secondary" href="quiz.html">再做一套</a>
                <a class="result-btn secondary" href="index.html">返回首页</a>
            </div>
            ${resultNote}
            ${saveCard}
            <div id="reviewArea" class="hidden" style="text-align:left;margin-top:32px;"></div>
        `;
        const saveButton = document.getElementById('saveHistoryBtn');
        if (saveButton) {
            saveButton.addEventListener('click', () => {
                pendingSaveResult = true;
                if (localStorage.getItem('token')) {
                    persistPendingResult('save_history');
                } else {
                    showAuthModal('guest_result');
                }
            });
        }
    }

    async function persistPendingResult(source = 'submit') {
        if (!pendingResultPayload) {
            trackEvent('quiz_persist_skipped', { source, reason: 'no_payload' }, 'error');
            return false;
        }
        try {
            const token = localStorage.getItem('token');
            if (!token) {
                trackEvent('quiz_persist_skipped', { source, reason: 'no_token' }, 'error');
                return false;
            }
            const response = await fetch('/api/quiz/submit', {
                method: 'POST',
                headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    level: pendingResultPayload.level,
                    year: pendingResultPayload.year,
                    answers: pendingResultPayload.answers,
                    duration: pendingResultPayload.duration,
                    score: pendingResultPayload.score,
                })
            });
            if (!response.ok) throw new Error(`submit_${response.status}`);
            const successEvent = source === 'submit' ? 'quiz_submit_success' : 'quiz_save_history_success';
            window.KETAnalytics?.track(successEvent, {
                meta: {
                    correct: pendingResultPayload.correct,
                    total: pendingResultPayload.total,
                    pct: pendingResultPayload.pct,
                    duration: pendingResultPayload.duration,
                },
                immediate: true,
                keepalive: true,
            });
            pendingResultPayload = null;
            renderResults();
            return true;
        } catch (e) {
            if (source === 'submit') {
                trackEvent('quiz_submit_failed', { message: e.message || 'upload_failed' }, 'error');
            } else {
                trackEvent('quiz_save_history_failed', { message: e.message || 'upload_failed' }, 'error');
            }
            console.error('Upload failed:', e);
            renderResults();
            return false;
        }
    }

    function reviewAnswers() {
        trackEvent('quiz_review_open', { total: allQuestions.length });
        const area = document.getElementById('reviewArea');
        if (!area.classList.contains('hidden')) { area.classList.add('hidden'); return; }
        area.classList.remove('hidden');

        let html = '';
        testData.parts.forEach(part => {
            html += `<div class="part-header" style="margin-top:24px;"><h3>${part.name}</h3></div>`;

            if (part.type === 'matching' && part.texts) {
                html += '<div class="matching-texts">';
                for (const [key, val] of Object.entries(part.texts)) {
                    html += `<div class="matching-text"><div class="label">${key}. ${val.title}</div><div class="content">${val.content}</div></div>`;
                }
                html += '</div>';
            }
            if (part.passage) {
                html += `<div class="q-text passage">${part.passage}</div>`;
            }

            part.questions.forEach(q => {
                const userAns = userAnswers[q.number] || '';
                const correctAns = Array.isArray(q.answer) ? q.answer[0] : q.answer;
                let isRight = false;
                if (Array.isArray(q.answer)) {
                    isRight = q.answer.some(a => a.toLowerCase() === userAns.toLowerCase());
                } else {
                    isRight = userAns.toUpperCase() === correctAns.toUpperCase();
                }

                html += `<div class="question-card ${isRight ? 'correct' : 'wrong'}">`;
                html += `<div class="q-number">Question ${q.number} ${isRight ? '✓' : '✗'}</div>`;

                if (q.text && part.type !== 'cloze_choice') {
                    html += `<div class="q-text ${q.textType || ''}">${q.text}</div>`;
                }

                // Matching review: show A/B/C options
                if (part.type === 'matching' && !q.options && part.texts) {
                    const keys = Object.keys(part.texts);
                    html += '<div class="options">';
                    keys.forEach(letter => {
                        let cls = '';
                        if (letter === correctAns.toUpperCase()) cls = 'correct-answer';
                        else if (letter === userAns.toUpperCase() && !isRight) cls = 'wrong-answer';
                        html += `<div class="option ${cls}"><span class="option-letter">${letter}</span><span>${part.texts[letter].title}</span></div>`;
                    });
                    html += '</div>';
                }

                if (q.options) {
                    html += '<div class="options">';
                    q.options.forEach((opt, i) => {
                        const letter = String.fromCharCode(65 + i);
                        let cls = '';
                        if (letter === correctAns.toUpperCase()) cls = 'correct-answer';
                        else if (letter === userAns.toUpperCase() && !isRight) cls = 'wrong-answer';
                        html += `<div class="option ${cls}"><span class="option-letter">${letter}</span><span>${opt.replace(/^[A-C]\.\s*/, '')}</span></div>`;
                    });
                    html += '</div>';
                }

                if (part.type === 'fill_blank' && !q.options) {
                    html += `<div style="margin-top:8px;">
                        <span>你的答案: </span><strong class="${isRight ? '' : 'wrong-answer'}" style="color:${isRight ? 'var(--correct)' : 'var(--wrong)'}">${userAns || '(未作答)'}</strong>
                        ${!isRight ? `<span class="correct-hint"> → 正确答案: ${Array.isArray(q.answer) ? q.answer.join(' / ') : q.answer}</span>` : ''}
                    </div>`;
                }

                html += '</div>';
            });
        });

        area.innerHTML = html;
    }

    // Init
    loadTestList();
    window.addEventListener('beforeunload', persistDraft);
    window.addEventListener('pagehide', () => {
        if (timerInterval) {
            clearInterval(timerInterval);
            timerInterval = null;
        }
        if (!submitted && getAnsweredCount() > 0) {
            persistDraft();
            trackEvent('quiz_in_progress_leave', {
                answered: getAnsweredCount(),
                total: allQuestions.length,
                testId: currentTestId,
            }, 'friction');
        }
    });

    function maybeTrackProgressCheckpoint(answered) {
        if (!allQuestions.length) return;
        [25, 50, 75, 100].forEach((percent) => {
            if (answered >= Math.ceil((percent / 100) * allQuestions.length) && !progressCheckpoints.has(percent)) {
                progressCheckpoints.add(percent);
                trackEvent('quiz_progress_checkpoint', { percent, answered, total: allQuestions.length });
            }
        });
    }
</script>
