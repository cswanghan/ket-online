<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KET Practice · 管理</title>
    <script src="auth-guard.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Noto+Serif+SC:wght@400;600&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --cream: #faf8f5; --warm: #f3ede6; --rose: #c4a08a; --rose-light: #e8d5c8;
            --rose-bg: #fdf5f0; --text: #3d3530; --text-light: #8a7e76; --accent: #b07d62;
            --success: #6b9a7d; --error: #c47070;
        }
        body { font-family: 'Noto Serif SC', 'Georgia', serif; background: var(--cream); color: var(--text); }
        .page { max-width: 800px; margin: 0 auto; padding: 40px 24px; }
        h1 { font-family: 'Playfair Display', 'Noto Serif SC', serif; font-size: 1.8rem; margin-bottom: 6px; color: var(--accent); }
        .sub { color: var(--text-light); font-size: 0.85rem; margin-bottom: 32px; }
        .nav-row { display: flex; gap: 12px; margin-bottom: 28px; }
        .nav-link { color: var(--text-light); text-decoration: none; font-size: 0.85rem; padding: 6px 16px; border: 1px solid var(--warm); border-radius: 14px; }
        .nav-link:hover { color: var(--accent); border-color: var(--rose); }
        .section { margin-bottom: 36px; }
        .section-title { font-size: 0.8rem; color: var(--text-light); text-transform: uppercase; letter-spacing: 2px; margin-bottom: 14px; padding-bottom: 8px; border-bottom: 1px solid var(--warm); }
        .user-row { background: white; border: 1px solid var(--warm); border-radius: 10px; padding: 14px 18px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
        .user-info .name { font-weight: 600; }
        .user-info .meta { font-size: 0.8rem; color: var(--text-light); margin-top: 2px; }
        .user-actions { display: flex; gap: 8px; }
        .action-btn { padding: 6px 14px; border: none; border-radius: 14px; font-size: 0.8rem; cursor: pointer; font-family: inherit; transition: all 0.15s; }
        .btn-approve { background: #e6f4ea; color: var(--success); }
        .btn-approve:hover { background: #ceead6; }
        .btn-reject { background: #fce8e6; color: var(--error); }
        .btn-reject:hover { background: #f5d0cc; }
        .invite-form { display: flex; gap: 10px; align-items: center; margin-bottom: 16px; }
        .invite-form input { padding: 8px 12px; border: 1px solid var(--warm); border-radius: 8px; font-family: inherit; font-size: 0.85rem; width: 80px; background: var(--cream); }
        .invite-form button { padding: 8px 16px; background: var(--accent); color: white; border: none; border-radius: 14px; font-size: 0.85rem; cursor: pointer; font-family: inherit; }
        .invite-form button:hover { background: #9a6b52; }
        .code-row { background: white; border: 1px solid var(--warm); border-radius: 8px; padding: 10px 14px; margin-bottom: 8px; font-size: 0.85rem; display: flex; justify-content: space-between; align-items: center; }
        .code-val { font-family: monospace; font-weight: 600; color: var(--accent); letter-spacing: 1px; }
        .code-meta { color: var(--text-light); font-size: 0.8rem; }
        .empty { color: var(--text-light); font-size: 0.85rem; padding: 20px; text-align: center; }
        .status-tabs { display: flex; gap: 0; margin-bottom: 16px; border-bottom: 1px solid var(--warm); }
        .st-tab { padding: 8px 20px; font-size: 0.85rem; color: var(--text-light); cursor: pointer; border-bottom: 2px solid transparent; }
        .st-tab.active { color: var(--accent); border-bottom-color: var(--accent); font-weight: 600; }
        .activity-card { background: white; border: 1px solid var(--warm); border-radius: 10px; padding: 16px 18px; margin-bottom: 10px; }
        .activity-card .card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
        .activity-card .name { font-weight: 600; }
        .activity-card .role-badge { font-size: 0.75rem; padding: 2px 10px; border-radius: 10px; background: var(--rose-bg); color: var(--accent); }
        .activity-card .stats { display: flex; gap: 16px; flex-wrap: wrap; font-size: 0.82rem; color: var(--text-light); }
        .activity-card .stat-val { font-weight: 600; color: var(--text); }
        .activity-card .no-quiz { font-size: 0.82rem; color: var(--text-light); font-style: italic; }
        .analytics-toolbar { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 16px; }
        .analytics-chip { padding: 7px 14px; border: 1px solid var(--warm); border-radius: 999px; background: white; color: var(--text-light); cursor: pointer; font-size: 0.82rem; }
        .analytics-chip.active { color: var(--accent); border-color: var(--rose); background: var(--rose-bg); font-weight: 600; }
        .analytics-grid { display: grid; grid-template-columns: repeat(4, minmax(0, 1fr)); gap: 12px; margin-bottom: 18px; }
        .analytics-card { background: white; border: 1px solid var(--warm); border-radius: 12px; padding: 14px 16px; }
        .analytics-card .k { color: var(--text-light); font-size: 0.78rem; text-transform: uppercase; letter-spacing: 1px; }
        .analytics-card .v { font-size: 1.5rem; color: var(--accent); font-weight: 700; margin-top: 6px; }
        .analytics-card .subv { color: var(--text-light); font-size: 0.8rem; margin-top: 4px; }
        .analytics-panels { display: grid; grid-template-columns: 1.3fr 1fr; gap: 14px; }
        .analytics-panel { background: white; border: 1px solid var(--warm); border-radius: 12px; padding: 14px 16px; }
        .analytics-panel h3 { font-size: 0.84rem; text-transform: uppercase; letter-spacing: 2px; color: var(--text-light); margin-bottom: 12px; }
        .analytics-list { display: grid; gap: 10px; }
        .analytics-row { display: flex; justify-content: space-between; gap: 14px; align-items: center; font-size: 0.84rem; }
        .analytics-row .name { color: var(--text); min-width: 0; }
        .analytics-row .meta { color: var(--text-light); font-size: 0.78rem; }
        .analytics-pill { padding: 2px 9px; border-radius: 999px; background: var(--rose-bg); color: var(--accent); font-size: 0.76rem; white-space: nowrap; }
        .analytics-funnels { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 14px; margin-top: 14px; }
        .funnel-step { display: grid; gap: 6px; margin-bottom: 12px; }
        .funnel-step:last-child { margin-bottom: 0; }
        .funnel-step .meta-row { display: flex; justify-content: space-between; gap: 12px; font-size: 0.82rem; }
        .funnel-step .label { color: var(--text); }
        .funnel-step .rate { color: var(--text-light); }
        .funnel-track { height: 8px; border-radius: 999px; background: var(--warm); overflow: hidden; }
        .funnel-fill { height: 100%; border-radius: inherit; background: linear-gradient(135deg, #c4a08a, #b07d62); }
        @media (max-width: 760px) {
            .analytics-grid, .analytics-panels, .analytics-funnels { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
<div class="page">
    <h1>管理后台</h1>
    <p class="sub" id="welcomeText">管理员</p>
    <div class="nav-row">
        <a href="index.html" class="nav-link">← 首页</a>
        <a href="javascript:logout()" class="nav-link">退出登录</a>
    </div>
    <div class="section" id="adminSection" style="display:none;">
        <div class="section-title">用户管理</div>
        <div class="status-tabs">
            <div class="st-tab active" onclick="loadUsers('pending')">待审核</div>
            <div class="st-tab" onclick="loadUsers('approved')">已通过</div>
            <div class="st-tab" onclick="loadUsers('rejected')">已拒绝</div>
            <div class="st-tab" onclick="loadActivity()">用户活动</div>
        </div>
        <div id="userList"><div class="empty">加载中...</div></div>
    </div>
    <div class="section" id="uxSection" style="display:none;">
        <div class="section-title">用户体验监控</div>
        <div class="analytics-toolbar">
            <button class="analytics-chip active" data-days="3" onclick="loadUxSummary(3)">近 3 天</button>
            <button class="analytics-chip" data-days="7" onclick="loadUxSummary(7)">近 7 天</button>
            <button class="analytics-chip" data-days="14" onclick="loadUxSummary(14)">近 14 天</button>
            <button class="analytics-chip" data-days="30" onclick="loadUxSummary(30)">近 30 天</button>
        </div>
        <div id="uxSummary"><div class="empty">加载中...</div></div>
    </div>
    <div class="section">
        <div class="section-title">邀请码</div>
        <div class="invite-form">
            <span style="font-size:0.85rem;">使用次数</span>
            <input type="number" id="maxUses" value="5" min="1" max="50">
            <span style="font-size:0.85rem;">有效天数</span>
            <input type="number" id="expDays" value="7" min="1" max="90">
            <button onclick="createInvite()">生成邀请码</button>
        </div>
        <div id="codeList"><div class="empty">加载中...</div></div>
    </div>
</div>
<script>
    const token = localStorage.getItem('token');
    const user = JSON.parse(localStorage.getItem('user') || '{}');
    document.getElementById('welcomeText').textContent = `${user.username || ''} · ${user.role === 'admin' ? '管理员' : '用户'}`;
    if (user.role === 'admin') {
        document.getElementById('adminSection').style.display = 'block';
        document.getElementById('uxSection').style.display = 'block';
        loadUsers('pending');
        loadUxSummary(7);
    }
    loadInvites();
    async function api(path, opts = {}) {
        const r = await fetch(path, { ...opts, headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json', ...opts.headers } });
        if (r.status === 401) { localStorage.clear(); window.location.href = 'login.html'; }
        return r.json();
    }
    async function loadUsers(status) {
        document.querySelectorAll('.st-tab').forEach(t => t.classList.toggle('active', t.textContent === {pending:'待审核',approved:'已通过',rejected:'已拒绝'}[status]));
        const data = await api(`/api/admin/users?status=${status}`);
        const list = document.getElementById('userList');
        if (!data.users?.length) { list.innerHTML = '<div class="empty">暂无数据</div>'; return; }
        list.innerHTML = data.users.map(u => `
            <div class="user-row">
                <div class="user-info"><div class="name">${u.username}</div><div class="meta">${u.phone || '无手机号'} · ${u.created_at?.slice(0,10) || ''}</div></div>
                ${status === 'pending' ? `<div class="user-actions"><button class="action-btn btn-approve" onclick="approveUser(${u.id}, 'approve')">通过</button><button class="action-btn btn-reject" onclick="approveUser(${u.id}, 'reject')">拒绝</button></div>` : ''}
            </div>`).join('');
    }
    async function loadActivity() {
        document.querySelectorAll('.st-tab').forEach(t => t.classList.toggle('active', t.textContent === '用户活动'));
        const list = document.getElementById('userList');
        list.innerHTML = '<div class="empty">加载中...</div>';
        const data = await api('/api/admin/activity');
        if (!data.users?.length) { list.innerHTML = '<div class="empty">暂无数据</div>'; return; }
        list.innerHTML = data.users.map(u => {
            if (!u.total_quizzes) return `<div class="activity-card"><div class="card-header"><span class="name">${u.username}</span><span class="role-badge">${u.role === 'admin' ? '管理员' : '用户'}</span></div><div class="no-quiz">尚未做题</div></div>`;
            return `<div class="activity-card"><div class="card-header"><span class="name">${u.username}</span><span class="role-badge">${u.role === 'admin' ? '管理员' : '用户'}</span></div><div class="stats"><span>做题次数: <span class="stat-val">${u.total_quizzes}</span></span><span>平均分: <span class="stat-val">${u.total_score != null ? u.total_score : '-'}</span></span><span>最近做题: <span class="stat-val">${u.last_quiz_at?.slice(0,10) || '-'}</span></span></div></div>`;
        }).join('');
    }
    async function approveUser(id, action) { await api('/api/admin/approve', { method: 'POST', body: JSON.stringify({ userId: id, action }) }); loadUsers('pending'); }
    async function loadInvites() {
        const data = await api('/api/invite/mine');
        const list = document.getElementById('codeList');
        if (!data.codes?.length) { list.innerHTML = '<div class="empty">还没有邀请码</div>'; return; }
        list.innerHTML = data.codes.map(c => {
            const expired = new Date(c.expires_at) < new Date();
            return `<div class="code-row" style="${expired ? 'opacity:0.5' : ''}"><span class="code-val">${c.code}</span><span class="code-meta">${c.used_count}/${c.max_uses} 已用 · ${expired ? '已过期' : '有效至 ' + c.expires_at.slice(0,10)}</span></div>`;
        }).join('');
    }
    async function createInvite() {
        const maxUses = parseInt(document.getElementById('maxUses').value) || 5;
        const expiresInDays = parseInt(document.getElementById('expDays').value) || 7;
        await api('/api/invite/create', { method: 'POST', body: JSON.stringify({ maxUses, expiresInDays }) });
        loadInvites();
    }
    async function loadUxSummary(days) {
        document.querySelectorAll('.analytics-chip').forEach(chip => chip.classList.toggle('active', Number(chip.dataset.days) === days));
        const container = document.getElementById('uxSummary');
        container.innerHTML = '<div class="empty">加载中...</div>';
        const data = await api(`/api/admin/ux-summary?days=${days}`);
        const overview = data.overview || {};
        const auth = data.auth || {};
        const quiz = data.quiz || {};
        const vocab = data.vocab || {};
        const pages = data.pages || [];
        const friction = data.friction || [];
        const quizFunnel = data.quizFunnel || [];
        const vocabFunnel = data.vocabFunnel || [];

        container.innerHTML = `
            <div class="analytics-grid">
                <div class="analytics-card"><div class="k">页面浏览</div><div class="v">${overview.pageViews || 0}</div><div class="subv">活跃会话 ${overview.activeSessions || 0}</div></div>
                <div class="analytics-card"><div class="k">平均停留</div><div class="v">${overview.avgDurationSeconds || 0}s</div><div class="subv">低参与跳出 ${overview.bounces || 0}</div></div>
                <div class="analytics-card"><div class="k">错误事件</div><div class="v">${overview.errors || 0}</div><div class="subv">脚本 / 接口 / 加载异常</div></div>
                <div class="analytics-card"><div class="k">登录成功率</div><div class="v">${auth.loginAttempts ? Math.round((auth.loginSuccess || 0) / auth.loginAttempts * 100) : 0}%</div><div class="subv">${auth.loginSuccess || 0} / ${auth.loginAttempts || 0}</div></div>
            </div>
            <div class="analytics-grid">
                <div class="analytics-card"><div class="k">做题启动</div><div class="v">${quiz.starts || 0}</div><div class="subv">看到结果 ${(quiz.submitSuccess || 0) + (quiz.guestResults || 0)}</div></div>
                <div class="analytics-card"><div class="k">历史保存</div><div class="v">${quiz.saveHistorySuccess || 0}</div><div class="subv">中途离开 ${quiz.inProgressLeave || 0}</div></div>
                <div class="analytics-card"><div class="k">背词会话</div><div class="v">${vocab.starts || 0}</div><div class="subv">每日计划使用 ${vocab.dailyFocus || 0}</div></div>
                <div class="analytics-card"><div class="k">背词完成量</div><div class="v">${vocab.wordCompletions || 0}</div><div class="subv">同步失败 ${vocab.syncFailed || 0}</div></div>
            </div>
            <div class="analytics-panels">
                <div class="analytics-panel">
                    <h3>高访问页面</h3>
                    <div class="analytics-list">
                        ${pages.length ? pages.map(page => `
                            <div class="analytics-row">
                                <div>
                                    <div class="name">${page.pagePath}</div>
                                    <div class="meta">平均停留 ${page.avgDurationSeconds}s · 跳出 ${page.bounceCount}</div>
                                </div>
                                <span class="analytics-pill">${page.views}</span>
                            </div>
                        `).join('') : '<div class="empty">暂无数据</div>'}
                    </div>
                </div>
                <div class="analytics-panel">
                    <h3>高摩擦事件</h3>
                    <div class="analytics-list">
                        ${friction.length ? friction.map(item => `
                            <div class="analytics-row">
                                <div class="name">${formatEventName(item.eventName)}</div>
                                <span class="analytics-pill">${item.total}</span>
                            </div>
                        `).join('') : '<div class="empty">暂无高摩擦事件</div>'}
                    </div>
                </div>
            </div>
            <div class="analytics-funnels">
                <div class="analytics-panel">
                    <h3>测验转化漏斗</h3>
                    ${renderFunnel(quizFunnel)}
                </div>
                <div class="analytics-panel">
                    <h3>背词转化漏斗</h3>
                    ${renderFunnel(vocabFunnel)}
                </div>
            </div>
        `;
    }
    function renderFunnel(steps) {
        if (!steps.length) return '<div class="empty">暂无漏斗数据</div>';
        const first = steps[0]?.count || 0;
        return steps.map((step, index) => {
            const prev = index === 0 ? first : (steps[index - 1]?.count || 0);
            const base = first || 1;
            const width = step.count ? Math.max(4, Math.round((step.count || 0) / base * 100)) : 0;
            const stepRate = prev ? Math.round((step.count || 0) / prev * 100) : (step.count ? 100 : 0);
            return `
                <div class="funnel-step">
                    <div class="meta-row">
                        <span class="label">${step.label}</span>
                        <span class="rate">${step.count || 0} · ${stepRate}%</span>
                    </div>
                    <div class="funnel-track"><div class="funnel-fill" style="width:${width}%"></div></div>
                </div>
            `;
        }).join('');
    }
    function formatEventName(name) {
        const labels = {
            js_error: '前端脚本错误',
            promise_rejection: 'Promise 异常',
            page_load_slow: '页面加载过慢',
            auth_login_failure: '登录失败',
            auth_register_failure: '注册失败',
            quiz_in_progress_leave: '做题中途离开',
            quiz_submit_failed: '做题结果上传失败',
            quiz_save_history_failed: '结果补存失败',
            vocab_sync_failed: '背词云同步失败',
            low_engagement_bounce: '低参与快速离开',
        };
        return labels[name] || name;
    }
    function logout() { localStorage.clear(); window.location.href = 'login.html'; }
</script>
</body>
</html>
