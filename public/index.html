<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KET&PET 练习 · 剑桥英语在线练习</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Noto+Serif+SC:wght@400;600&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --cream: #faf8f5; --warm: #f3ede6; --rose: #c4a08a; --rose-light: #e8d5c8;
            --rose-bg: #fdf5f0; --text: #3d3530; --text-light: #8a7e76; --accent: #b07d62;
        }
        body { font-family: 'Noto Serif SC', 'Georgia', serif; background: var(--cream); min-height: 100vh; color: var(--text); }
        .page { max-width: 960px; margin: 0 auto; padding: 40px 24px 60px; }
        .site-header { text-align: center; margin-bottom: 48px; position: relative; }
        .site-header h1 {
            font-family: 'Playfair Display', 'Noto Serif SC', serif;
            font-size: 2.6rem; font-weight: 700; letter-spacing: 2px; margin-bottom: 8px;
        }
        .site-header .tagline { color: var(--text-light); font-size: 1rem; letter-spacing: 1px; }

        .level-tabs {
            display: flex; justify-content: center; gap: 0;
            margin-bottom: 48px; border-bottom: 1px solid var(--rose-light);
            overflow-x: auto; -webkit-overflow-scrolling: touch;
        }
        .level-tab {
            padding: 12px 28px; font-family: 'Noto Serif SC', serif;
            font-size: 0.95rem; color: var(--text-light); cursor: pointer;
            border-bottom: 2px solid transparent; transition: all 0.2s;
            letter-spacing: 1px; white-space: nowrap; flex-shrink: 0;
        }
        .level-tab:hover { color: var(--text); }
        .level-tab.active { color: var(--accent); border-bottom-color: var(--accent); font-weight: 600; }

        .level-info { text-align: center; margin-bottom: 48px; color: var(--text-light); font-size: 0.9rem; }
        .level-info .grade {
            display: inline-block; background: var(--rose-bg); color: var(--accent);
            padding: 4px 16px; border-radius: 12px; font-size: 0.8rem; margin-top: 6px;
        }

        .entry-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 28px; max-width: 640px; margin: 0 auto; }
        .entry-card {
            background: white; border: 1px solid var(--warm); border-radius: 16px;
            padding: 44px 28px; text-decoration: none; color: var(--text);
            display: flex; flex-direction: column; align-items: center; gap: 16px;
            transition: all 0.25s; position: relative; overflow: hidden;
        }
        .entry-card::before {
            content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px;
            background: var(--rose-light); transition: background 0.25s;
        }
        .entry-card:hover { border-color: var(--rose); box-shadow: 0 8px 30px rgba(180,140,110,0.1); transform: translateY(-2px); }
        .entry-card:hover::before { background: var(--accent); }
        .entry-icon { font-size: 2.2rem; }
        .entry-title { font-family: 'Playfair Display', 'Noto Serif SC', serif; font-size: 1.3rem; font-weight: 600; }
        .entry-desc { color: var(--text-light); font-size: 0.85rem; line-height: 1.7; text-align: center; }
        .entry-action { font-size: 0.8rem; color: var(--accent); letter-spacing: 1px; text-transform: uppercase; margin-top: 4px; }

        .login-link { text-align: center; margin-top: 48px; }
        .login-link a {
            color: var(--text-light); text-decoration: none; font-size: 0.85rem;
            padding: 8px 20px; border: 1px solid var(--warm); border-radius: 20px; transition: all 0.2s;
        }
        .login-link a:hover { color: var(--accent); border-color: var(--rose); }
        .site-footer { text-align: center; margin-top: 60px; color: var(--text-light); font-size: 0.8rem; opacity: 0.7; }

        @media (max-width: 600px) {
            .site-header h1 { font-size: 2rem; }
            .entry-grid { grid-template-columns: 1fr; max-width: 360px; }
            .entry-card { padding: 36px 24px; }
            .page { padding: 30px 16px 40px; }
            .level-tab { padding: 10px 14px; font-size: 0.85rem; }
        }
    </style>
</head>
<body>
    <div class="page">
        <div class="site-header">
            <h1>KET&PET 练习</h1>
            <p class="tagline">剑桥英语 · 在线练习与真题</p>
        </div>

        <div class="level-tabs">
            <div class="level-tab active" onclick="switchLevel('ket')">KET (A2 Key)</div>
            <div class="level-tab" onclick="switchLevel('pet')">PET (B1 Preliminary)</div>
        </div>

        <div class="level-info" id="levelInfo">
            <div>Reading & Writing · Part 1-5 · 每套 30 题</div>
            <div class="grade">适合小学高年级 — 初中</div>
        </div>

        <div class="entry-grid">
            <a id="quizEntry" href="quiz.html" class="entry-card">
                <div class="entry-icon">✏️</div>
                <div class="entry-title">在线练习</div>
                <div class="entry-desc">选择套卷逐题作答<br>自动判分 · 错题回顾</div>
                <div class="entry-action">Start →</div>
            </a>
            <a id="historyEntry" href="admin.html" class="entry-card">
                <div class="entry-icon">📊</div>
                <div class="entry-title">个人中心</div>
                <div class="entry-desc">历史成绩 · 错题本<br>邀请码管理</div>
                <div class="entry-action">View →</div>
            </a>
        </div>

        <div class="login-link" id="authArea">
            <a href="login.html">登录 / 注册</a>
        </div>

        <div class="site-footer">Cambridge English Practice Platform</div>
    </div>

    <script>
        (function() {
            const user = JSON.parse(localStorage.getItem('user') || 'null');
            if (user) {
                const area = document.getElementById('authArea');
                const adminLink = user.role === 'admin' ? ' <a href="admin.html">管理后台</a>' : '';
                area.innerHTML = `<span style="color:var(--text-light);font-size:0.85rem;">${user.username}</span> ` +
                    `<a href="admin.html">个人中心</a>` + adminLink +
                    ` <a href="javascript:void(0)" onclick="localStorage.clear();location.reload()">退出</a>`;
            }
        })();

        let currentLevel = 'ket';

        function switchLevel(level) {
            currentLevel = level;
            document.querySelectorAll('.level-tab').forEach((t, i) => t.classList.toggle('active', (level === 'ket' ? i === 0 : i === 1)));
            if (level === 'pet') {
                document.getElementById('levelInfo').innerHTML = '<div>Reading · Part 1-6 · 每套 32 题</div><div class="grade">适合初中 — 高中</div>';
            } else {
                document.getElementById('levelInfo').innerHTML = '<div>Reading & Writing · Part 1-5 · 每套 30 题</div><div class="grade">适合小学高年级 — 初中</div>';
            }
            document.getElementById('quizEntry').href = `quiz.html?level=${level}`;
        }
    </script>
</body>
</html>
